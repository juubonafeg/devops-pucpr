name: CI/CD Pipeline Marketing Vinhos

on:
  push:
    branches: [ "main", "feature/analise-vinhos", "feature/testes-e-alertas" ]
  pull_request:
    branches: [ "main" ]

jobs:
  Continuous-Integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests with pytest
      run: |
        pytest test_analise.py

  Continuous-Delivery:
    needs: Continuous-Integration
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Mock Deployment
      run: echo "Deploy da analise de vinhos realizado com sucesso!"

    - name: Discord notification
      if: always()
      uses: rjstone/discord-webhook-action@v2
      with:
        webhookUrl: ${{ secrets.https://discord.com/api/webhooks/1488379014954356736/C1eVJk1b-F3tJay7X79M9cqXuzpsd1fkzfCZv19OZNsK7H4vgYqDjZQkYXfmtbKnRq41 }}
        severity: info
        details: "O arquivo foi executado com sucesso"
        description: "Status final do processo: ${{ job.status }}"