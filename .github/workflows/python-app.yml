name: CI/CD Pipeline Marketing Vinhos

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  Continuous-Integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests with pytest
      run: |
        pytest test_analise.py

  Continuous-Delivery:
    needs: Continuous-Integration
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Mock Deployment
      run: echo "Deploy da aplicacao de analise de marketing realizado com sucesso no ambiente de producao!"

      - name: Discord notification
      uses: rjstone/discord-webhook-notify@v1
      if: always()
      with:
        severity: info
        details: 'O Pipeline de Marketing da Júlia finalizou com sucesso!'
        webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}